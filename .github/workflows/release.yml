name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release, for example v5.0.0
        required: false
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      draft:
        description: Create as draft release
        required: false
        default: true
        type: boolean
      prerelease:
        description: Mark release as prerelease
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve tag and release settings
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          default_tag="v${version}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            draft="false"
            prerelease="false"
            release_name="Rally ${tag}"
          else
            tag="${{ github.event.inputs.tag }}"
            tag="${tag:-$default_tag}"
            draft="${{ github.event.inputs.draft }}"
            prerelease="${{ github.event.inputs.prerelease }}"
            release_name="${{ github.event.inputs.release_name }}"
            release_name="${release_name:-Rally ${tag}}"
          fi

          if [[ "$tag" != "$default_tag" ]]; then
            echo "Requested tag '$tag' does not match VERSION-derived tag '$default_tag'." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Build release bundle (${{ matrix.os }})
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve platform label
        id: platform
        shell: bash
        run: |
          set -euo pipefail

          case "${{ runner.os }}" in
            Linux) platform_os="linux" ;;
            macOS) platform_os="darwin" ;;
            Windows) platform_os="windows" ;;
            *)
              echo "Unsupported runner OS: ${{ runner.os }}" >&2
              exit 1
              ;;
          esac

          case "${{ runner.arch }}" in
            X64) platform_arch="amd64" ;;
            ARM64) platform_arch="arm64" ;;
            *)
              echo "Unsupported runner architecture: ${{ runner.arch }}" >&2
              exit 1
              ;;
          esac

          label="${platform_os}-${platform_arch}"
          archive_name="rally-${label}"

          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package release bundle
        shell: bash
        run: python scripts/package_release.py --target-dir "dist/${{ steps.platform.outputs.label }}" --label "${{ steps.platform.outputs.label }}"

      - name: Create tarball archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          tar -czf "${{ steps.platform.outputs.archive_name }}.tar.gz" "${{ steps.platform.outputs.label }}"

      - name: Create zip archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ steps.platform.outputs.label }}/*" -DestinationPath "dist/${{ steps.platform.outputs.archive_name }}.zip" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.platform.outputs.archive_name }}
          path: |
            dist/${{ steps.platform.outputs.archive_name }}.tar.gz
            dist/${{ steps.platform.outputs.archive_name }}.zip
          if-no-files-found: ignore

  publish:
    name: Publish GitHub release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.metadata.outputs.release_name }}
          draft: ${{ needs.metadata.outputs.draft == 'true' }}
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
